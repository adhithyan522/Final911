<div class="card h-100 border-0 custom-card shadow-sm" style="width: 18rem; overflow: hidden; border-radius: 20px; background-color: #ffffff;">
    <div class="position-relative overflow-hidden">
        <img [src]="cars.image" class="card-img-top img-fluid" alt="{{ cars.name }}"
             style="height: 220px; object-fit: cover; transition: transform 0.5s ease;">
        <div class="position-absolute top-0 end-0 m-3 badge px-3 py-2 fw-bold shadow-sm" 
             style="background-color: #d45454; border-radius: 50px; font-size: 0.75rem; letter-spacing: 1px; color: #ffffff;">
            {{ cars.year }}
        </div>
    </div>

    <div class="card-body d-flex flex-column p-4">
        <h5 class="card-title fw-black text-uppercase mb-1 text-truncate" style="color: #0f172a; font-size: 1.1rem; letter-spacing: 0.5px;">
            {{ cars.name }}
        </h5>

        <p class="text-muted small mb-3 fw-semibold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">
            {{ cars.fuel_type }} <span class="mx-1 text-danger">•</span> {{ cars.transmission }}
        </p>

        <p class="card-text small flex-grow-1 text-muted mb-4" style="line-height: 1.6; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;">
            {{ cars.description }}
        </p>

        <div class="d-flex justify-content-between align-items-center mt-auto pt-3 border-top border-light">
            <div class="d-flex flex-column">
                <span class="text-muted fw-bold text-uppercase" style="font-size: 0.6rem; letter-spacing: 1px;">Price</span>
                <span class="h5 fw-black m-0" style="color: #0f172a;">₹ {{ cars.price }}</span>
            </div>
            
            <button [routerLink]="['/cars/car-details', cars.id]" 
                    class="btn btn-action px-3 fw-bold text-uppercase shadow-sm" 
                    style="background-color: #0f172a; color: #f8fafc; border-radius: 12px; font-size: 0.75rem; padding: 10px 15px; border: none; transition: 0.3s;">
                Details
            </button>
        </div>
    </div>
</div>

<div class="py-5" style="background-color: #f8fafc; min-height: 100vh;">
  <div class="container">
    
    <div class="mb-5">
      <h2 class="fw-black text-uppercase letter-spacing-2 m-0" style="color: #0f172a;">
        Available <span style="color: #d45454;">Inventory</span>
      </h2>
      <div style="width: 80px; height: 5px; background-color: #d45454; margin-top: 10px;"></div>
    </div>

    <div class="row g-4 justify-content-center">
    @for (item of cars; track item.id) {
        <div class="col-xl-4 col-lg-4 col-md-6 col-sm-12 d-flex justify-content-center">
          <app-card [cars]="item" class="w-100"></app-card>
        </div>
      }
      @empty {
        <div class="col-12 text-center py-5">
          <div class="p-5 rounded-4 shadow-sm bg-white" style="border: 2px dashed #cbd5e1;">
            <i class="bi bi-search mb-3 d-block" style="font-size: 3rem; color: #94a3b8;"></i>
            <h4 class="fw-bold" style="color: #0f172a;">No Vehicles Found</h4>
            <p class="text-muted">We couldn't find any cars matching your criteria at the moment.</p>
            <button class="btn btn-outline-dark px-4 fw-bold text-uppercase" (click)="resetFilters()" style="border-radius: 8px;">
              Clear All Filters
            </button>
          </div>
        </div>
      }
    </div>

  </div>
</div>
